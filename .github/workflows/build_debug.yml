name: Build Debug APK

permissions:
  contents: write

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK (with retries for Jitpack)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 25
          max_attempts: 3
          retry_wait_seconds: 30
          command: ./gradlew app:assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

      - name: Rename APK with version and commit SHA
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/aniyomiTV-${VERSION}-${GITHUB_SHA::7}.apk

      - name: Upload artifact (for Actions tab)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: aniyomiTV-${{ github.sha }}
          path: app/build/outputs/apk/debug/aniyomiTV-*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Move nightly tag to HEAD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f nightly
          git push origin nightly --force

      - name: Create or update nightly GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: nightly
          name: "AniyomiTV Nightly (latest)"
          prerelease: true
          body: |
            Automated build from the latest `main` commit.

            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            > Install directly on your Android TV emulator or device.
            > You may need to enable "Install from unknown sources".
          files: app/build/outputs/apk/debug/aniyomiTV-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

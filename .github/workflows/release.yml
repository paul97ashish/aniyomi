name: Release APK

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build preview APK (with retries for Jitpack)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 25
          max_attempts: 3
          retry_wait_seconds: 30
          command: ./gradlew app:assemblePreview --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

      - name: Rename APKs with version tag
        run: |
          TAG=${GITHUB_REF_NAME}
          for apk in app/build/outputs/apk/preview/*.apk; do
            ABI=$(basename "$apk" | sed 's/app-//;s/-preview.apk//')
            mv "$apk" "app/build/outputs/apk/preview/aniyomiTV-${TAG}-${ABI}.apk"
          done

      - name: Upload APKs to GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: app/build/outputs/apk/preview/aniyomiTV-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
